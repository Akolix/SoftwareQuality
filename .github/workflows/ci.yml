name: CI - DTAP Pipeline

on:
  push:
    branches: 
      - main
      - master
      - 'observer-pattern'
      - 'strategy-pattern'
      - 'factory-pattern'
  pull_request:
    branches: 
      - main
      - master

jobs:
  development:
    name: "D - Development"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean compile
      
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: development-classes
          path: target/classes/
          retention-days: 1

  testing:
    name: "T - Testing"
    runs-on: ubuntu-latest
    needs: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests
        run: mvn test
      
      - name: Generate coverage report
        run: mvn jacoco:report
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  acceptance:
    name: "A - Acceptance"
    runs-on: ubuntu-latest
    needs: testing
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Package application
        run: mvn package -DskipTests
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jabberpoint-jar
          path: target/*.jar
          retention-days: 30

  production:
    name: "P - Production"
    runs-on: ubuntu-latest
    needs: acceptance
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download JAR from acceptance
        uses: actions/download-artifact@v4
        with:
          name: jabberpoint-jar
          path: dist/
      
      - name: Create production release
        run: |
          mkdir -p production/jabberpoint
          cp dist/*.jar production/jabberpoint/
          echo "Build: ${{ github.run_number }}" > production/jabberpoint/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> production/jabberpoint/BUILD_INFO.txt
          echo "Date: $(date)" >> production/jabberpoint/BUILD_INFO.txt
      
      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-release-${{ github.run_number }}
          path: production/
          retention-days: 90
